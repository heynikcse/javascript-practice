    //How do we calculate the total in an Array?

    const nums = [1, 3, 1];
    let total = 0;

    for(let i = 0; i < nums.length; i++ ) {
      const num = nums[i];
      total += num;
    }
    console.log(total);

    const numsDoubled = [];

    for (let i = 0; i < nums.length; i++) {
      const num = nums[i];
      numsDoubled.push(num * 2);
    }
    console.log(numsDoubled);

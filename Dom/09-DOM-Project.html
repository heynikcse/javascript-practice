<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DOM Projeccts</title>
  <style>
    body{
      font-family: Arial, Helvetica, sans-serif;
    }
    
    .subscribe-button{
      border: none;
      background-color: black;
      color: white;
      font-weight: bold;
      padding: 10px 15px;
      border-radius: 60px;
      cursor: pointer;
    }

    .is-subscribed {
      background-color: rgba(240, 240, 240);
      color: black;
    }

    #cost-input{
      padding: 10px 12px;
      border: 1px solid black;
    }

    #calculate-button{
      padding: 10px 12px;
      border: none;
      background-color: green;
      color: white;
    }
  </style>
</head>
<body>

  <p>YouTube Subscribe Button</p>

  <button class="js-subscribe-button subscribe-button" onclick="
    subscribe();
  ">  Subscribe  </button>

  <p>Amazon Shipping Calculator</p>

  <input id="cost-input" placeholder="Cost of order" type="text" class="js-cost-input" onkeydown="
    handleCalculateKey(event);
  ">

  <button id="calculate-button" onclick="
    calculateTotal();
  ">Calculate</button>

  <p class="js-totalcost"></p>


  <script>

    function handleCalculateKey(event) {
      if (event.key === 'Enter') {
        calculateTotal();
      }
    }

    function calculateTotal() {
      const inputElement = document.querySelector('.js-cost-input');
      let cost = Number(inputElement.value); 
      // changing cost into integer by using Number.

      if (cost < 40) {
        cost = cost + 10 ;
      } 

      document.querySelector('.js-totalcost')
        .innerHTML = `$${cost}`;
    }


    function subscribe() {
      const buttonElement = document.querySelector('.js-subscribe-button');

      if (buttonElement.innerText === 'Subscribe') {
        buttonElement.innerHTML = 'Subscribed';
        buttonElement.classList.add('is-subscribed');
      } else {
        buttonElement.innerHTML = 'Subscribe';
        buttonElement.classList.remove('is-subscribed');
      }
    }

  </script>
</body>
</html>
